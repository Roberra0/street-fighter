<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>STREET BRAWL</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }
  canvas {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    -ms-interpolation-mode: nearest-neighbor;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// Internal resolution
const GW = 480, GH = 300;
canvas.width = GW;
canvas.height = GH;

function resize() {
  const s = Math.min(window.innerWidth / GW, window.innerHeight / GH);
  const sw = Math.floor(GW * s);
  const sh = Math.floor(GH * s);
  canvas.style.width = sw + 'px';
  canvas.style.height = sh + 'px';
}
resize();
window.addEventListener('resize', resize);

// ---- AUDIO ----
let audioCtx;
function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
function beep(freq, dur, type, vol) {
  if (!audioCtx) return;
  try {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type || 'square';
    o.frequency.value = freq;
    g.gain.value = vol || 0.12;
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + dur);
  } catch(e) {}
}
function sfxHit() { beep(120, 0.15, 'sawtooth', 0.2); beep(80, 0.1, 'square', 0.12); }
function sfxBlock() { beep(400, 0.06, 'triangle', 0.1); }
function sfxSwing() { beep(500, 0.06, 'sawtooth', 0.04); }
function sfxKO() { beep(60, 0.6, 'sawtooth', 0.25); setTimeout(() => beep(40, 0.8, 'square', 0.2), 200); }
function sfxRound() { beep(440, 0.12, 'square', 0.12); setTimeout(() => beep(660, 0.25, 'square', 0.12), 180); }

// ---- INPUT ----
const keyDown = {};
const keyPressed = {};
const keyPrev = {};
window.addEventListener('keydown', e => {
  e.preventDefault();
  keyDown[e.code] = true;
});
window.addEventListener('keyup', e => {
  e.preventDefault();
  keyDown[e.code] = false;
});

function updateInput() {
  for (const k in keyDown) {
    keyPressed[k] = keyDown[k] && !keyPrev[k];
    keyPrev[k] = keyDown[k];
  }
}

// ---- CONSTANTS ----
const GRAVITY = 0.55;
const GROUND = 228;
const WALL_L = 24;
const WALL_R = GW - 24;

// ---- PARTICLES ----
let particles = [];
function spawnHitSpark(x, y) {
  for (let i = 0; i < 6; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 4,
      vy: (Math.random() - 0.7) * 3,
      life: 10 + Math.random() * 8,
      color: Math.random() > 0.5 ? '#ff0' : '#fff',
      size: 2 + Math.random() * 2,
    });
  }
}
function spawnBlockSpark(x, y) {
  for (let i = 0; i < 4; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 3,
      vy: (Math.random() - 0.5) * 2,
      life: 6 + Math.random() * 4,
      color: '#8af',
      size: 2,
    });
  }
}
function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.15;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}
function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = Math.min(1, p.life / 5);
    ctx.fillStyle = p.color;
    ctx.fillRect(Math.round(p.x), Math.round(p.y), Math.ceil(p.size), Math.ceil(p.size));
  }
  ctx.globalAlpha = 1;
}

// ---- FIGHTER ----
class Fighter {
  constructor(startX, face, pal, name) {
    this.startX = startX;
    this.name = name;
    this.pal = pal;
    this.facing = face;
    this.reset();
  }

  reset() {
    this.x = this.startX;
    this.y = GROUND;
    this.vx = 0;
    this.vy = 0;
    this.hp = 100;
    this.state = 'idle';
    this.timer = 0;
    this.didHit = false;
    this.blocking = false;
    this.comboCt = 0;
    this.comboTimer = 0;
    this.stunTimer = 0;
    this.pushVx = 0;
  }

  get grounded() { return this.y >= GROUND; }

  hurtbox() {
    const crouch = this.state === 'crouch';
    const w = 26;
    const h = crouch ? 36 : 54;
    const top = crouch ? this.y - 36 : this.y - 54;
    return { x: this.x - w / 2, y: top, w, h };
  }

  hitbox() {
    if (this.state === 'punch' && this.timer >= 3 && this.timer <= 7 && !this.didHit) {
      const reach = 28;
      return {
        x: this.facing === 1 ? this.x + 8 : this.x - 8 - reach,
        y: this.y - 44,
        w: reach, h: 12, dmg: 8, kb: 3.5,
      };
    }
    if (this.state === 'kick' && this.timer >= 5 && this.timer <= 11 && !this.didHit) {
      const reach = 34;
      return {
        x: this.facing === 1 ? this.x + 6 : this.x - 6 - reach,
        y: this.y - 22,
        w: reach, h: 14, dmg: 13, kb: 5,
      };
    }
    return null;
  }

  canAct() {
    return (this.state === 'idle' || this.state === 'walk' || this.state === 'crouch') && this.stunTimer <= 0;
  }

  update(inp, opp) {
    // combo timer
    if (this.comboTimer > 0) { this.comboTimer--; if (this.comboTimer <= 0) this.comboCt = 0; }

    // pushback
    if (this.pushVx !== 0) {
      this.x += this.pushVx;
      this.pushVx *= 0.7;
      if (Math.abs(this.pushVx) < 0.3) this.pushVx = 0;
    }

    // stun
    if (this.stunTimer > 0) {
      this.stunTimer--;
      if (this.stunTimer <= 0 && (this.state === 'hit' || this.state === 'block')) this.state = 'idle';
      if (!this.grounded) { this.vy += GRAVITY; this.y += this.vy; this.x += this.vx; if (this.y >= GROUND) { this.y = GROUND; this.vx = 0; this.vy = 0; } }
      return;
    }

    // KO
    if (this.state === 'ko') {
      if (!this.grounded) { this.vy += GRAVITY; this.y += this.vy; this.x += this.vx; if (this.y >= GROUND) { this.y = GROUND; this.vx = 0; } }
      return;
    }

    // attack anim
    if (this.state === 'punch') {
      this.timer++;
      if (this.timer > 14) { this.state = 'idle'; this.timer = 0; this.didHit = false; }
      return;
    }
    if (this.state === 'kick') {
      this.timer++;
      if (this.timer > 20) { this.state = 'idle'; this.timer = 0; this.didHit = false; }
      return;
    }

    // Airborne
    if (!this.grounded) {
      this.vy += GRAVITY;
      this.y += this.vy;
      this.x += this.vx;
      if (this.y >= GROUND) { this.y = GROUND; this.vy = 0; this.vx = 0; this.state = 'idle'; }
      if (inp.punch) { this.state = 'punch'; this.timer = 0; this.didHit = false; sfxSwing(); return; }
      if (inp.kick)  { this.state = 'kick';  this.timer = 0; this.didHit = false; sfxSwing(); return; }
      return;
    }

    this.blocking = inp.block;

    // Movement
    const spd = 2.2;
    if (inp.left && !inp.right) { this.x -= spd; this.state = 'walk'; }
    else if (inp.right && !inp.left) { this.x += spd; this.state = 'walk'; }
    else if (inp.down) { this.state = 'crouch'; }
    else { if (this.state === 'walk' || this.state === 'crouch') this.state = 'idle'; }

    // Jump
    if (inp.up && this.grounded) {
      this.vy = -9.5;
      this.y -= 1;
      this.state = 'jump';
      this.vx = inp.left ? -2.2 : inp.right ? 2.2 : 0;
    }

    // Attacks
    if (inp.punch && this.canAct()) { this.state = 'punch'; this.timer = 0; this.didHit = false; sfxSwing(); }
    if (inp.kick && this.canAct())  { this.state = 'kick';  this.timer = 0; this.didHit = false; sfxSwing(); }

    // Face opponent
    if (this.canAct() || this.state === 'jump') {
      this.facing = opp.x > this.x ? 1 : -1;
    }

    this.x = Math.max(WALL_L, Math.min(WALL_R, this.x));
  }

  receiveDamage(dmg, kb, attacker) {
    const facingAtt = (attacker.x > this.x) === (this.facing === 1);
    if (this.blocking && facingAtt && this.grounded) {
      this.state = 'block';
      this.stunTimer = 8;
      this.pushVx = attacker.x > this.x ? -kb * 0.8 : kb * 0.8;
      sfxBlock();
      spawnBlockSpark((this.x + attacker.x) / 2, this.y - 34);
      freezeTimer = 3;
      return;
    }

    this.hp = Math.max(0, this.hp - dmg);
    this.state = 'hit';
    this.stunTimer = 12;
    this.pushVx = attacker.x > this.x ? -kb * 1.4 : kb * 1.4;
    this.comboCt++;
    this.comboTimer = 60;

    sfxHit();
    spawnHitSpark((this.x + attacker.x) / 2, this.y - 36);
    freezeTimer = 6;
    screenShake = 5;

    if (this.hp <= 0) {
      this.state = 'ko';
      this.vy = -7;
      this.vx = attacker.x > this.x ? -3 : 3;
      this.y -= 1;
      sfxKO();
      freezeTimer = 18;
      screenShake = 10;
    }
  }

  draw() {
    const px = Math.round(this.x);
    const py = Math.round(this.y);
    const f = this.facing;
    const P = this.pal;

    ctx.save();
    ctx.translate(px, py);
    ctx.scale(f, 1);

    if (this.state === 'hit' && this.stunTimer % 4 < 2) ctx.globalAlpha = 0.55;

    const R = (x, y, w, h, c) => { ctx.fillStyle = c; ctx.fillRect(x|0, y|0, w, h); };

    if (this.state === 'ko') {
      if (this.grounded) {
        R(-22, -8, 44, 8, P.body);
        R(-18, -12, 12, 10, P.skin);
        R(-18, -16, 12, 6, P.hair);
        R(6, -6, 18, 6, P.pants);
      } else {
        R(-8, -52, 16, 8, P.hair);
        R(-8, -44, 16, 12, P.skin);
        R(-10, -32, 20, 20, P.body);
        R(-8, -12, 8, 16, P.pants); R(2, -12, 8, 16, P.pants);
        R(-16, -28, 6, 6, P.skin); R(14, -28, 6, 6, P.skin);
      }
      ctx.restore(); return;
    }

    if (this.state === 'crouch') {
      R(-7, -34, 14, 6, P.hair);
      R(-7, -28, 14, 10, P.skin);
      R(2, -24, 3, 2, '#111');
      R(-10, -18, 20, 14, P.body);
      R(-10, -6, 20, 3, P.belt);
      R(-8, -3, 8, 8, P.pants); R(2, -3, 8, 8, P.pants);
      R(10, -16, 8, 6, P.skin);
      R(-14, -14, 6, 6, P.skin);
      ctx.restore(); return;
    }

    if (this.state === 'block') {
      R(-7, -54, 14, 7, P.hair);
      R(-7, -48, 14, 10, P.skin);
      R(2, -44, 3, 2, '#111');
      R(-10, -38, 20, 18, P.body);
      R(-2, -36, 12, 12, P.skin);
      R(-10, -20, 20, 3, P.belt);
      R(-8, -17, 8, 17, P.pants); R(2, -17, 8, 17, P.pants);
      R(-8, 0, 10, 4, P.shoes); R(2, 0, 10, 4, P.shoes);
      ctx.restore(); return;
    }

    if (this.state === 'punch') {
      const t = this.timer;
      R(-7, -54, 14, 7, P.hair);
      R(-7, -48, 14, 10, P.skin);
      R(3, -44, 3, 2, '#111');
      R(-10, -38, 20, 18, P.body);
      R(-10, -20, 20, 3, P.belt);
      R(-8, -17, 8, 17, P.pants); R(2, -17, 8, 17, P.pants);
      R(-8, 0, 10, 4, P.shoes); R(2, 0, 10, 4, P.shoes);
      if (t < 3) {
        R(-12, -36, 7, 6, P.skin); R(8, -34, 7, 6, P.skin);
      } else if (t <= 7) {
        R(10, -40, 22, 8, P.skin);
        R(10, -40, 5, 8, P.body);
        R(-12, -34, 7, 6, P.skin);
      } else {
        R(4, -36, 10, 6, P.skin); R(-12, -34, 7, 6, P.skin);
      }
      ctx.restore(); return;
    }

    if (this.state === 'kick') {
      const t = this.timer;
      R(-7, -54, 14, 7, P.hair);
      R(-7, -48, 14, 10, P.skin);
      R(3, -44, 3, 2, '#111');
      R(-10, -38, 20, 18, P.body);
      R(-10, -20, 20, 3, P.belt);
      R(10, -36, 7, 6, P.skin); R(-12, -34, 7, 6, P.skin);
      if (t < 5) {
        R(-8, -17, 8, 17, P.pants);
        R(-8, 0, 10, 4, P.shoes);
        R(2, -17, 8, 8, P.pants);
      } else if (t <= 11) {
        R(-8, -17, 8, 17, P.pants);
        R(-8, 0, 10, 4, P.shoes);
        R(2, -14, 30, 8, P.pants);
        R(28, -14, 8, 8, P.shoes);
      } else {
        R(-8, -17, 8, 17, P.pants); R(2, -17, 8, 17, P.pants);
        R(-8, 0, 10, 4, P.shoes); R(2, 0, 10, 4, P.shoes);
      }
      ctx.restore(); return;
    }

    // IDLE / WALK / JUMP
    const bob = this.state === 'idle' ? Math.sin(Date.now() / 280) * 1.5 : 0;
    const walk = this.state === 'walk' ? Math.sin(Date.now() / 90) * 3.5 : 0;
    const by = Math.round(bob);

    R(-7, -54 + by, 14, 7, P.hair);
    R(-7, -48 + by, 14, 10, P.skin);
    R(-8, -48 + by, 16, 3, P.accent);
    R(2, -44 + by, 3, 3, '#111');
    R(1, -40 + by, 3, 1, P.skinDk);
    R(-10, -38 + by, 20, 18, P.body);
    R(-10, -20, 20, 3, P.belt);

    const aSwing = Math.round(walk * 0.4);
    R(10, -36 + by - aSwing, 7, 12, P.skin);
    R(10, -36 + by - aSwing, 7, 5, P.body);
    R(-13, -36 + by + aSwing, 7, 12, P.skin);
    R(-13, -36 + by + aSwing, 7, 5, P.body);

    const lSwing = Math.round(walk);
    R(-8 + lSwing / 2, -17, 8, 17, P.pants);
    R(2 - lSwing / 2, -17, 8, 17, P.pants);
    R(-8, 0, 10, 4, P.shoes);
    R(2, 0, 10, 4, P.shoes);

    ctx.restore();

    if (this.comboCt > 1 && this.comboTimer > 0) {
      ctx.fillStyle = '#ff0';
      ctx.font = 'bold 10px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(this.comboCt + ' HITS!', px, py - 64);
    }
  }
}

// Palettes
const PAL1 = {
  body: '#ddd8cc', skin: '#e8b87a', skinDk: '#b8885a',
  hair: '#1a1008', accent: '#cc2222', belt: '#222',
  pants: '#ddd8cc', shoes: '#553311',
};
const PAL2 = {
  body: '#2244cc', skin: '#e8b87a', skinDk: '#b8885a',
  hair: '#dda030', accent: '#2244cc', belt: '#112266',
  pants: '#2244cc', shoes: '#442200',
};

const p1 = new Fighter(140, 1, PAL1, 'RYU');
const p2 = new Fighter(GW - 140, -1, PAL2, 'KEN');

// ---- GAME STATE ----
let gameState = 'title';
let roundTimer = 99;
let roundAcc = 0;
let p1Wins = 0, p2Wins = 0, roundNum = 1;
let freezeTimer = 0;
let screenShake = 0;
let msgText = '';
let msgTimer = 0;
let titleBlink = 0;

// ---- BACKGROUND ----
function drawBG() {
  const g = ctx.createLinearGradient(0, 0, 0, GH);
  g.addColorStop(0, '#0e0620');
  g.addColorStop(0.4, '#2a1040');
  g.addColorStop(0.7, '#4a1a30');
  g.addColorStop(1, '#1a0e0e');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, GW, GH);

  ctx.fillStyle = '#ffe8a0';
  ctx.beginPath(); ctx.arc(380, 42, 16, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#0e0620';
  ctx.beginPath(); ctx.arc(387, 38, 14, 0, Math.PI * 2); ctx.fill();

  ctx.fillStyle = '#fff8';
  const stars = [[40,16],[100,34],[170,12],[240,28],[310,8],[420,24],[60,48],[450,14],[145,52],[280,42],[390,58]];
  for (const [sx, sy] of stars) ctx.fillRect(sx, sy, 1, 1);

  ctx.fillStyle = '#120a1a';
  const blds = [[0,88,65],[50,104,50],[110,78,45],[165,115,60],[235,96,48],[295,108,52],[355,82,55],[420,100,60]];
  for (const [bx, bt, bw] of blds) ctx.fillRect(bx, bt, bw, GROUND + 4 - bt);

  ctx.fillStyle = '#ffcc4422';
  for (const [bx, bt, bw] of blds) {
    for (let wx = bx + 6; wx < bx + bw - 8; wx += 12) {
      for (let wy = bt + 8; wy < GROUND - 10; wy += 16) {
        if (Math.sin(wx * 4.1 + wy * 2.7) > 0.15) ctx.fillRect(wx, wy, 5, 7);
      }
    }
  }

  ctx.fillStyle = '#2a1a1a';
  ctx.fillRect(0, GROUND - 16, GW, 18);
  ctx.fillStyle = '#3a2828';
  for (let fx = 4; fx < GW; fx += 14) ctx.fillRect(fx, GROUND - 14, 2, 16);
  ctx.fillRect(0, GROUND - 14, GW, 2);
  ctx.fillRect(0, GROUND - 4, GW, 2);

  const flick = Math.sin(Date.now() / 180) > -0.7 ? 1 : 0.25;
  ctx.save();
  ctx.globalAlpha = flick;
  ctx.fillStyle = '#ff333340';
  ctx.fillRect(22, GROUND - 32, 74, 14);
  ctx.fillStyle = '#ff4444';
  ctx.font = 'bold 9px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('FIGHT CLUB', 26, GROUND - 22);
  ctx.restore();

  ctx.fillStyle = '#cc3333';
  ctx.fillRect(GW - 50, GROUND - 36, 8, 14);
  ctx.fillStyle = '#ff664488';
  ctx.fillRect(GW - 49, GROUND - 34, 6, 10);

  ctx.fillStyle = '#1e1616';
  ctx.fillRect(0, GROUND + 4, GW, GH - GROUND);
  ctx.fillStyle = '#2a2020';
  ctx.fillRect(0, GROUND + 4, GW, 2);
  ctx.fillStyle = '#342a2a';
  for (let lx = 15; lx < GW; lx += 36) ctx.fillRect(lx, GROUND + 18, 18, 2);
}

// ---- UI ----
function drawHUD() {
  const bW = 170, bH = 12, bY = 14;

  ctx.fillStyle = '#181818';
  ctx.fillRect(18, bY - 1, bW + 2, bH + 2);
  ctx.fillStyle = '#440000';
  ctx.fillRect(19, bY, bW, bH);
  const w1 = Math.max(0, (p1.hp / 100) * bW);
  ctx.fillStyle = p1.hp > 50 ? '#3c3' : p1.hp > 25 ? '#cc3' : '#c33';
  ctx.fillRect(19, bY, w1, bH);
  ctx.fillStyle = '#fff3';
  ctx.fillRect(19, bY, w1, 3);

  ctx.fillStyle = '#181818';
  ctx.fillRect(GW - 20 - bW, bY - 1, bW + 2, bH + 2);
  ctx.fillStyle = '#440000';
  ctx.fillRect(GW - 19 - bW, bY, bW, bH);
  const w2 = Math.max(0, (p2.hp / 100) * bW);
  ctx.fillStyle = p2.hp > 50 ? '#3c3' : p2.hp > 25 ? '#cc3' : '#c33';
  ctx.fillRect(GW - 19 - bW + (bW - w2), bY, w2, bH);
  ctx.fillStyle = '#fff3';
  ctx.fillRect(GW - 19 - bW + (bW - w2), bY, w2, 3);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 9px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('RYU', 19, bY - 3);
  ctx.textAlign = 'right';
  ctx.fillText('KEN', GW - 19, bY - 3);

  for (let i = 0; i < p1Wins; i++) { ctx.fillStyle = '#fc5'; ctx.fillRect(20 + i * 12, bY + bH + 5, 7, 7); }
  for (let i = 0; i < p2Wins; i++) { ctx.fillStyle = '#fc5'; ctx.fillRect(GW - 27 - i * 12, bY + bH + 5, 7, 7); }

  ctx.fillStyle = '#181818';
  ctx.fillRect(GW / 2 - 16, bY - 4, 32, 22);
  ctx.fillStyle = '#fc5';
  ctx.font = 'bold 16px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(String(Math.ceil(roundTimer)).padStart(2, '0'), GW / 2, bY + 14);

  ctx.fillStyle = '#888';
  ctx.font = '7px monospace';
  ctx.fillText('ROUND ' + roundNum, GW / 2, bY + 26);
}

function drawMessage() {
  if (!msgText) return;
  ctx.fillStyle = '#00000099';
  ctx.fillRect(0, GH / 2 - 22, GW, 44);
  ctx.fillStyle = '#fc5';
  ctx.font = 'bold 24px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(msgText, GW / 2, GH / 2);
  ctx.textBaseline = 'alphabetic';
}

function drawTitle() {
  drawBG();
  ctx.fillStyle = '#00000088';
  ctx.fillRect(0, 0, GW, GH);

  ctx.fillStyle = '#fc5';
  ctx.font = 'bold 30px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('STREET BRAWL', GW / 2, 80);

  ctx.fillStyle = '#c33';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('LOCAL VERSUS', GW / 2, 108);

  ctx.fillStyle = '#bbb';
  ctx.font = '10px monospace';
  ctx.fillText('P1:  WASD move  |  J punch  |  K kick  |  L block', GW / 2, 150);
  ctx.fillText('P2:  Arrows move  |  1 punch  |  2 kick  |  3 block', GW / 2, 168);

  titleBlink += 0.04;
  ctx.globalAlpha = 0.4 + Math.sin(titleBlink) * 0.6;
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 12px monospace';
  ctx.fillText('PRESS  ENTER  TO  FIGHT', GW / 2, 220);
  ctx.globalAlpha = 1;
}

// ---- COLLISION ----
function boxHit(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function pushApart() {
  const a = p1.hurtbox(), b = p2.hurtbox();
  if (boxHit(a, b)) {
    const ov = Math.min(a.x + a.w - b.x, b.x + b.w - a.x);
    if (ov > 0) {
      const push = ov / 2 + 1;
      if (p1.x < p2.x) { p1.x -= push; p2.x += push; }
      else { p1.x += push; p2.x -= push; }
    }
  }
}

// ---- INPUT MAPPING ----
function inp1() {
  return {
    left: keyDown['KeyA'], right: keyDown['KeyD'], up: keyDown['KeyW'], down: keyDown['KeyS'],
    punch: keyPressed['KeyJ'], kick: keyPressed['KeyK'], block: keyDown['KeyL'],
  };
}
function inp2() {
  return {
    left: keyDown['ArrowLeft'], right: keyDown['ArrowRight'], up: keyDown['ArrowUp'], down: keyDown['ArrowDown'],
    punch: keyPressed['Digit1'], kick: keyPressed['Digit2'], block: keyDown['Digit3'],
  };
}

function startRound() {
  p1.reset(); p2.reset();
  roundTimer = 99; roundAcc = 0;
  particles = [];
  gameState = 'intro';
  msgText = 'ROUND ' + roundNum;
  msgTimer = 90;
  sfxRound();
}

function startMatch() {
  p1Wins = 0; p2Wins = 0; roundNum = 1;
  startRound();
}

function drawShadow(f) {
  ctx.fillStyle = '#0004';
  const sw = 20 + (GROUND - f.y) * 0.08;
  ctx.fillRect(Math.round(f.x - sw / 2), GROUND + 2, Math.round(sw), 3);
}

// ---- MAIN LOOP ----
let last = 0;
function loop(t) {
  requestAnimationFrame(loop);
  const dt = t - last; last = t;
  if (dt > 100) return;

  updateInput();

  screenShake *= 0.8;
  if (screenShake < 0.4) screenShake = 0;

  // Freeze
  if (freezeTimer > 0) {
    freezeTimer--;
    ctx.save();
    if (screenShake > 0) ctx.translate(Math.round((Math.random() - 0.5) * screenShake), Math.round((Math.random() - 0.5) * screenShake));
    drawBG();
    drawShadow(p1); drawShadow(p2);
    p1.draw(); p2.draw();
    drawParticles();
    drawHUD();
    drawMessage();
    ctx.restore();
    return;
  }

  // TITLE
  if (gameState === 'title') {
    drawTitle();
    if (keyPressed['Enter'] || keyPressed['Space']) {
      initAudio();
      startMatch();
    }
    return;
  }

  // INTRO
  if (gameState === 'intro') {
    msgTimer--;
    if (msgTimer === 40) msgText = 'FIGHT!';
    if (msgTimer <= 0) { msgText = ''; gameState = 'fight'; }
  }

  // FIGHT
  if (gameState === 'fight') {
    roundAcc += dt;
    if (roundAcc >= 1000) { roundAcc -= 1000; roundTimer = Math.max(0, roundTimer - 1); }

    p1.update(inp1(), p2);
    p2.update(inp2(), p1);
    pushApart();
    p1.x = Math.max(WALL_L, Math.min(WALL_R, p1.x));
    p2.x = Math.max(WALL_L, Math.min(WALL_R, p2.x));

    const h1 = p1.hitbox();
    if (h1 && !p1.didHit && boxHit(h1, p2.hurtbox())) { p1.didHit = true; p2.receiveDamage(h1.dmg, h1.kb, p1); }
    const h2 = p2.hitbox();
    if (h2 && !p2.didHit && boxHit(h2, p1.hurtbox())) { p2.didHit = true; p1.receiveDamage(h2.dmg, h2.kb, p2); }

    if (p1.hp <= 0 || p2.hp <= 0 || roundTimer <= 0) {
      gameState = 'roundEnd';
      msgTimer = 150;
      if (p1.hp <= 0) { p2Wins++; msgText = 'K.O.!'; }
      else if (p2.hp <= 0) { p1Wins++; msgText = 'K.O.!'; }
      else if (p1.hp > p2.hp) { p1Wins++; msgText = 'TIME!'; }
      else if (p2.hp > p1.hp) { p2Wins++; msgText = 'TIME!'; }
      else { msgText = 'DRAW!'; }
    }
  }

  // ROUND END
  if (gameState === 'roundEnd') {
    const noInp = { left:false, right:false, up:false, down:false, punch:false, kick:false, block:false };
    p1.update(noInp, p2);
    p2.update(noInp, p1);
    msgTimer--;
    if (msgTimer <= 0) {
      if (p1Wins >= 2 || p2Wins >= 2) {
        gameState = 'matchEnd';
        msgText = (p1Wins >= 2 ? 'PLAYER 1' : 'PLAYER 2') + ' WINS!';
        msgTimer = 200;
      } else {
        roundNum++;
        startRound();
      }
    }
  }

  // MATCH END
  if (gameState === 'matchEnd') {
    msgTimer--;
    if (msgTimer <= -30) {
      msgText = 'PRESS ENTER';
      if (keyPressed['Enter'] || keyPressed['Space']) startMatch();
    }
  }

  updateParticles();

  // RENDER
  ctx.save();
  if (screenShake > 0) ctx.translate(Math.round((Math.random() - 0.5) * screenShake), Math.round((Math.random() - 0.5) * screenShake));
  drawBG();
  drawShadow(p1); drawShadow(p2);
  p1.draw(); p2.draw();
  drawParticles();
  drawHUD();
  drawMessage();
  ctx.restore();
}

requestAnimationFrame(loop);
</script>
</body>
